[tool.uv.workspace]
members = [
    "packages/graph-agent",
    "packages/graph-agent-viewer",
]

[tool.uv.sources]
graph-agent = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=1.18.2",
]

[tool.mypy]
python_version = "3.12"
files = [
    "packages/graph-agent/src",
    "packages/graph-agent/tests",
    "example",
    "packages/graph-agent-viewer/src",
    "packages/graph-agent-viewer/tests",
]
mypy_path = [
    "packages/graph-agent/src",
    "packages/graph-agent-viewer/src",
]
show_error_codes = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "graph_agent.*"
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "graph_agent_viewer.*"
check_untyped_defs = true
